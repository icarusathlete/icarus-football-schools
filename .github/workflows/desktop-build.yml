name: Desktop App Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm install && npm rebuild --verbose
        
      - name: Build Web Assets
        run: npm run build
        
      - name: Build Desktop App
        run: npx electron-builder --mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false # Skip signing if not configured
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Icarus-App-macOS
          path: dist-desktop/*.app.zip # Zip it for download
