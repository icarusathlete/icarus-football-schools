
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Academy Portal</title>
    
    <!-- PWA Settings -->
    <link rel="manifest" href="/manifest.json">
    <meta id="theme-color" name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/53/53283.png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@400;600;700;800&family=Orbitron:wght@400;600;700;800&family=Oswald:wght@400;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style id="brand-styles">
      :root {
        --brand-primary: #64748b;
        --brand-secondary: #0f172a;
      }
      body { background-color: var(--brand-secondary); }
    </style>

    <script>
      (function() {
        try {
          const settings = JSON.parse(localStorage.getItem('icarus_settings'));
          if (settings) {
            const root = document.documentElement;
            if (settings.primaryColor) root.style.setProperty('--brand-primary', settings.primaryColor);
            if (settings.secondaryColor) {
              root.style.setProperty('--brand-secondary', settings.secondaryColor);
              document.body.style.backgroundColor = settings.secondaryColor;
              const meta = document.getElementById('theme-color');
              if (meta) meta.setAttribute('content', settings.secondaryColor);
            }
          }
        } catch (e) {}
      })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                 50: '#f8fafc',
                 500: 'var(--brand-primary)',
                 900: 'var(--brand-secondary)',
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            }
          }
        }
      }
    </script>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.35.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "html2canvas": "https://esm.sh/html2canvas@1.4.1",
    "jspdf": "https://esm.sh/jspdf@2.5.1"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="text-white antialiased select-none font-sans" style="background-color: var(--brand-secondary);">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
