    <!-- PWA Settings -->
    <link rel="manifest" href="/manifest.json">
    <meta id="theme-color" name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <!-- Fonts -->

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@400;600;700;800&family=Orbitron:wght@400;600;700;800&family=Oswald:wght@400;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style id="brand-styles">
      :root {
        --brand-primary: #00C8FF; /* Sky Blue */
        --brand-secondary: #0D1B8A; /* Deep Midnight */
        --brand-accent: #C3F629; /* Vibrant Lime */
        --brand-sky: #00C8FF; /* Sky Highlight */
        --brand-bg: #FFFFFF;
        --brand-text: #0D1B8A;
      }
      body { 
        background-color: var(--brand-bg); 
        color: var(--brand-text);
        overflow-x: hidden;
        width: 100vw;
      }
      #root {
        width: 100%;
        overflow-x: hidden;
      }
      /* Custom Micro-animations & utilities */
      .premium-card {
        background: var(--brand-primary);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 2rem;
        box-shadow: 0 20px 40px -15px rgba(0, 200, 255, 0.3);
        transition: all 0.4s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        color: white;
      }
      .premium-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 35px -5px rgba(14, 165, 233, 0.2); /* Sky Blue glow */
        border-color: rgba(14, 165, 233, 0.4); 
      }
      .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
      .animate-slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
      
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
      }
      
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: var(--brand-secondary); }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    </style>

    <script>
      (function() {
        try {
          const settings = JSON.parse(localStorage.getItem('icarus_settings'));
          if (settings) {
            const root = document.documentElement;
            if (settings.primaryColor) root.style.setProperty('--brand-primary', settings.primaryColor);
            if (settings.secondaryColor) {
              root.style.setProperty('--brand-secondary', settings.secondaryColor);
              document.body.style.backgroundColor = settings.secondaryColor;
              const meta = document.getElementById('theme-color');
              if (meta) meta.setAttribute('content', settings.secondaryColor);
            }
          }
          // Force dark mode
          document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              brand: {
                 50: '#f0f9ff',
                 100: '#e0f2fe',
                 200: '#bae6fd',
                 300: '#7dd3fc',
                 400: '#40d5ff',
                 500: '#00C8FF',
                 600: '#00b4e6',
                 700: '#00a0cc',
                 800: '#008bb3',
                 900: 'var(--brand-secondary)',
                 950: '#0D1B8A',
              },
              lime: {
                DEFAULT: '#C3F629',
                glow: 'rgba(190, 242, 100, 0.5)'
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              heading: ['Montserrat', 'sans-serif'],
              display: ['Orbitron', 'sans-serif'],
            },
            animation: {
              'spin-slow': 'spin 3s linear infinite',
              'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            }
          }
        }
      }
